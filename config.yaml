md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
"RAG-MIA": 
    filters: [
        "Membership Inference Attack on RAG",
        "Membership Inference Attack against RAG",
        "Membership Inference for RAG",
        "Membership Inference on RAG",
        "MIA on RAG",
        "MIA against RAG",
        "Privacy Leakage in RAG",
        "RAG-leaks",
        "BudgetLeak",
        "SeqMIA"
    ]
